[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["services/app"]
filterwarnings = [
    "ignore::DeprecationWarning:fastapi",
    "ignore::DeprecationWarning:starlette",
]

[tool.ruff]
target-version = "py312"
line-length = 88

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "UP",  # pyupgrade
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
]
ignore = [
    "E501",  # line too long — handled by the formatter
    "B008",  # Depends() in argument defaults is the standard FastAPI DI pattern
]

[tool.ruff.lint.isort]
known-first-party = ["app"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
